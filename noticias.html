<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícias | OEDLA</title>
  <meta name="description" content="Notícias curtas, boletins de monitoramento e acompanhamento de fatos conjunturais da extrema direita na América Latina.">
  <script>
    (function () {
      const themeKey = 'oedla-theme';
      const backgroundKey = 'oedla-bg-image';
      const bgLight = 'assets/img/background-light.png';
      const bgDark = 'assets/img/background-dark.png';
      let theme = '';
      try {
        const saved = localStorage.getItem(themeKey);
        theme = saved === 'dark' || saved === 'light'
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_error) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      const expectedBackground = theme === 'dark' ? bgDark : bgLight;
      let backgroundPath = expectedBackground;
      try {
        const storedBackground = localStorage.getItem(backgroundKey);
        backgroundPath = storedBackground === expectedBackground
          ? storedBackground
          : expectedBackground;
      } catch (_error) {
        backgroundPath = expectedBackground;
      }

      const root = document.documentElement;
      root.setAttribute('data-theme', theme);
      root.style.setProperty('--page-bg-image', `url('${backgroundPath}')`);

      try {
        localStorage.setItem(backgroundKey, backgroundPath);
      } catch (_error) {
        // Ignore storage failures.
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="noticias">
  <div class="page-glow" aria-hidden="true"></div>
  <div id="site-header"></div>

  <main class="blog-main">
    <section class="blog-hero reveal">
      <p class="kicker">Monitoramento e Atualidades</p>
      <h1>Notícias</h1>
      <p>
        Boletins informativos, notas técnicas rápidas e acompanhamento de fatos conjunturais da extrema direita.
      </p>
    </section>

    <section class="filters reveal" id="blog-filters" aria-label="Filtros de categoria">
      <button class="filter active" data-filter="all">Todos</button>
    </section>

    <section class="posts-grid reveal" id="posts-grid" aria-live="polite">
      <article class="post-card" id="posts-loading">
        <p class="preview-meta">Carregando...</p>
        <h2>Buscando notícias em Markdown</h2>
        <p>Se essa mensagem não sair, verifique se o servidor local está ativo.</p>
      </article>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
