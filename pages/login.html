<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login CMS | OEDLA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root {
      --border-color: var(--stroke);
      --text-color: var(--ink);
      --surface-bg: var(--surface);
      --bg-color: var(--bg);
    }

    .login-container {
      max-width: 400px;
      margin: 6rem auto;
      padding: 2.5rem 2rem;
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .login-container h1 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.75rem;
      text-align: center;
      font-family: "Playfair Display", serif;
      color: var(--ink);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--ink);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--stroke);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .form-group input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 191, 0, 0.15);
    }
    .btn-block {
      width: 100%;
      display: block;
      text-align: center;
      margin-top: 1rem;
    }
    .error-msg {
      color: #ff4a4a;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
      background: rgba(255, 74, 74, 0.1);
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 74, 74, 0.2);
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: { extend: { colors: { primary: '#ffbf00' }, fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } }
    }
  </script>
</head>
<body data-page="login">
  <div class="page-glow" aria-hidden="true"></div>
  <div id="site-header"></div>

  <main>
    <div class="login-container">
      <h1>Acesso ao CMS</h1>
      <p id="error-msg" class="error-msg">Email ou senha incorretos.</p>
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>
    </div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="../script.js"></script>
  <script type="module">
    import { supabase } from '../supabase-config.js';

    // Check current session
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        window.location.href = 'admin.html';
      }
    });

    // Check on load as well
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = 'admin.html';
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });
        if (error) throw error;
        window.location.href = 'admin.html';
      } catch (error) {
        console.error(error);
        errorMsg.style.display = 'block';
        errorMsg.innerText = 'Falha no login: ' + error.message;
      }
    });
  </script>
</body>
</html>
