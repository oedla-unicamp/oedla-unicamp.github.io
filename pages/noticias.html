<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin" />
  <title>Notícias | OEDLA</title>
  <meta name="description" content="Notícias curtas, boletins de monitoramento e acompanhamento de fatos conjunturais da extrema direita na América Latina.">
  <meta property="og:title" content="Notícias | OEDLA" />
  <meta property="og:description" content="Notícias curtas, boletins de monitoramento e acompanhamento de fatos conjunturais da extrema direita na América Latina." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://jnspgpmdmouvkmoqaxlc.supabase.co/storage/v1/object/public/public-assets/latin_america_map.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <script>
    (function () {
      const themeKey = 'oedla-theme';
      const backgroundKey = 'oedla-bg-image';
      const bgLight = 'assets/img/background-light.png';
      const bgDark = 'assets/img/background-dark.png';
      let theme = '';
      try {
        const saved = localStorage.getItem(themeKey);
        theme = saved === 'dark' || saved === 'light'
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_error) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      const expectedBackground = theme === 'dark' ? bgDark : bgLight;
      let backgroundPath = expectedBackground;
      try {
        const storedBackground = localStorage.getItem(backgroundKey);
        backgroundPath = storedBackground === expectedBackground
          ? storedBackground
          : expectedBackground;
      } catch (_error) {
        backgroundPath = expectedBackground;
      }

      const root = document.documentElement;
      root.setAttribute('data-theme', theme);
      root.style.setProperty('--page-bg-image', `url('${backgroundPath}')`);

      try {
        localStorage.setItem(backgroundKey, backgroundPath);
      } catch (_error) {
        // Ignore storage failures.
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tailwind.css">
</head>
<body data-page="noticias">
  <div class="page-glow" aria-hidden="true"></div>
  <div id="site-header">
    <nav class="hidden" aria-label="Navegação estática">
      <a href="../index.html">Início</a>
      <a href="quemsomos.html">Quem somos</a>
      <a href="blog.html">Blog</a>
      <a href="noticias.html">Notícias</a>
      <a href="eventos.html">Eventos</a>
    </nav>
  </div>

  <main id="main-content" class="max-w-6xl mx-auto px-6 py-20">
    <section class="mb-16 border-b border-gray-200 dark:border-gray-800 pb-8">
      <p class="font-sans text-sm font-bold uppercase tracking-widest text-primary mb-4" id="page-keywords">Monitoramento e Atualidades</p>
      <div class="flex justify-between items-center mb-6">
        <h1 class="font-serif text-5xl md:text-7xl font-bold text-gray-900 dark:text-white leading-tight mb-0">Notícias</h1>
        <!-- Botão de Filtro Mobile (visível apenas no mobile) -->
        <button id="toggle-sidebar-btn" class="lg:hidden shrink-0 flex items-center justify-center w-10 h-10 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:text-primary hover:border-primary transition-all shadow-sm rounded-sm" aria-label="Filtrar e Buscar">
          <i class="fa-solid fa-filter text-sm"></i>
        </button>
      </div>
      <p class="font-sans text-xl text-gray-600 dark:text-gray-400 max-w-2xl" id="page-subtitle">
        Boletins informativos, notas técnicas rápidas e acompanhamento de fatos conjunturais da extrema direita.
      </p>
    </section>

    <!-- Layout de Duas Colunas -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">

      <!-- Coluna Lateral (Busca, Filtros e Ordenação) -->
      <aside id="sidebar-filters" class="hidden lg:flex lg:col-span-4 order-2 lg:order-2 lg:sticky lg:top-32 flex-col gap-6 bg-gray-50/50 dark:bg-gray-900/10 border border-gray-200 dark:border-gray-800 p-6 rounded w-full">
        <!-- Busca -->
        <div class="flex flex-col gap-2">
          <h3 class="font-sans text-[10px] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500">Buscar</h3>
          <div class="relative w-full">
            <input type="text" id="search-input" placeholder="Buscar por título, autor..." class="w-full pl-10 pr-4 py-2 font-sans text-sm bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
              <i class="fa-solid fa-magnifying-glass text-xs"></i>
            </span>
          </div>
        </div>

        <!-- Seletor de Ordenação -->
        <div class="flex flex-col gap-2">
          <h3 class="font-sans text-[10px] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500">Ordenar</h3>
          <select id="sort-select" class="w-full px-3 py-2 font-sans text-xs font-semibold bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm rounded-none">
            <option value="newest" selected>Mais novos primeiro</option>
            <option value="oldest">Mais antigos primeiro</option>
          </select>
        </div>

        <!-- Limite por Página -->
        <div class="flex flex-col gap-2">
          <h3 class="font-sans text-[10px] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500">Publicações por página</h3>
          <select id="limit-select" class="w-full px-3 py-2 font-sans text-xs font-semibold bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm rounded-none">
            <option value="10">10 por página</option>
            <option value="25" selected>25 por página</option>
            <option value="50">50 por página</option>
            <option value="100">100 por página</option>
          </select>
        </div>

        <!-- Filtros de Categorias -->
        <div class="flex flex-col gap-2">
          <h3 class="font-sans text-[10px] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-500">Categorias</h3>
          <div class="flex flex-wrap gap-2" id="blog-filters" aria-label="Filtros de categoria">
            <button class="filter active px-3 py-1.5 font-sans text-xs font-bold uppercase tracking-wider border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:border-primary hover:text-primary transition-colors rounded-none" data-filter="all">Todos</button>
          </div>
        </div>
      </aside>

      <!-- Coluna Principal (Lista de Posts) -->
      <div class="lg:col-span-8 order-3 lg:order-1 flex flex-col gap-8 w-full">
        <!-- Grid de Posts -->
        <section class="flex flex-col gap-0" id="posts-grid" aria-live="polite">
          <p class="font-sans text-sm text-gray-500">Buscando notícias em Markdown...</p>
        </section>
        
        <!-- Controles de Paginação -->
        <div id="pagination-controls" class="flex justify-center items-center gap-2 mt-8 py-4 border-t border-gray-200 dark:border-gray-800"></div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="../script.js"></script>
</body>
</html>
